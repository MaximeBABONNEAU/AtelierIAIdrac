<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Marketing Academy | IDRAC Business School</title>
  <meta name="description" content="Atelier IA et Marketing Digital - IDRAC Business School - Master 1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <!-- ========== LOGIN ========== -->
  <div id="page-login" class="login-container">
    <div class="login-card glass-card">
      <div class="login-logo">
        <div class="logo-badge">IDRAC</div>
        <h1>AI Marketing <span class="gradient-text">Academy</span></h1>
        <p class="login-subtitle">Master 1 Marketing Digital &bull; IDRAC Business School</p>
        <p class="login-mentor">Formation animee par <strong>Maxime BABONNEAU</strong></p>
      </div>
      <div class="login-form">
        <div class="form-group">
          <label for="student-name">Ton prenom</label>
          <input type="text" id="student-name" placeholder="Ex: Marie" required autocomplete="given-name" maxlength="20">
        </div>
        <div class="form-group">
          <label for="class-code">Code de la formation</label>
          <input type="text" id="class-code" placeholder="Code fourni par le formateur" required autocomplete="off">
        </div>
        <button type="button" class="btn-primary" id="btn-login">
          <span>Rejoindre la formation</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <button class="admin-access-link" id="btn-admin-access">Acces Formateur</button>
      <div id="admin-login-panel" class="admin-login-panel hidden glass-card">
        <div class="form-group">
          <label for="admin-password">Mot de passe formateur</label>
          <input type="password" id="admin-password" placeholder="Mot de passe" required autocomplete="off">
        </div>
        <button type="button" class="btn-primary btn-admin" id="btn-admin-login">
          <span>Connexion Formateur</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ========== APP SHELL ========== -->
  <div id="app-shell" class="hidden">
    <nav id="main-nav">
      <div class="nav-left">
        <span class="nav-title">AI Academy <span class="nav-school">IDRAC</span></span>
      </div>
      <div class="nav-links" id="nav-links">
        <a href="#" data-navigate="dashboard" class="nav-link active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
          <span>Accueil</span>
        </a>
        <a href="#" data-navigate="program" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
          <span>Programme</span>
        </a>
        <a href="#" data-navigate="room" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          <span>Salle</span>
        </a>
        <a href="#" data-navigate="demos" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
          <span>Demos</span>
        </a>
        <a href="#" data-navigate="arena" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          <span>Arena</span>
        </a>
        <a href="#" data-navigate="business-game" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 00-8 0v2"/></svg>
          <span>Game</span>
        </a>
        <a href="#" data-navigate="leaderboard" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 010-5C7 4 7 9 7 9"/><path d="M18 9h1.5a2.5 2.5 0 000-5C17 4 17 9 17 9"/><path d="M4 22h16"/><path d="M10 22V2h4v20"/></svg>
          <span>Classement</span>
        </a>
        <a href="#" data-navigate="profile" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>
          <span>Profil</span>
        </a>
      </div>
      <div class="nav-right">
        <div class="nav-xp" id="nav-xp">
          <span class="xp-amount" id="nav-xp-amount">0</span>
          <span class="xp-label">XP</span>
        </div>
        <button class="btn-icon" id="btn-logout" title="Deconnexion">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </nav>

    <nav id="mobile-nav">
      <a href="#" data-navigate="dashboard" class="mobile-link active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Accueil</span>
      </a>
      <a href="#" data-navigate="program" class="mobile-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        <span>Programme</span>
      </a>
      <a href="#" data-navigate="room" class="mobile-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/></svg>
        <span>Salle</span>
      </a>
      <a href="#" data-navigate="demos" class="mobile-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>
        <span>Demos</span>
      </a>
      <a href="#" data-navigate="profile" class="mobile-link">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0113 0"/></svg>
        <span>Profil</span>
      </a>
    </nav>

    <main id="main-content"></main>
  </div>

  <!-- ========== POPUPS ========== -->
  <div id="toast-container"></div>
  <div id="xp-popup" class="xp-popup hidden">
    <div class="xp-popup-content">
      <span class="xp-popup-amount" id="xp-popup-amount">+50</span>
      <span class="xp-popup-reason" id="xp-popup-reason">Activite completee</span>
    </div>
  </div>
  <div id="badge-popup" class="badge-popup hidden">
    <div class="badge-popup-content glass-card">
      <div class="badge-popup-icon" id="badge-popup-icon">🏆</div>
      <h3>Badge debloque !</h3>
      <p id="badge-popup-name">Nom du badge</p>
      <button class="btn-primary btn-sm" id="badge-popup-close">Super !</button>
    </div>
  </div>

  <!-- ========== SCRIPTS ========== -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/room.js"></script>
  <script src="js/demos.js"></script>
  <script src="js/battle.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
